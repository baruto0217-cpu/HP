<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病院受け入れ状況</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== 設定：ここを自分のSupabase情報に変更 ===== */
  /* SUPABASE_URL と SUPABASE_ANON_KEY は下のscriptタグ内で設定 */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --ok: #3fb950;
    --ok-bg: rgba(63, 185, 80, 0.1);
    --ok-border: rgba(63, 185, 80, 0.35);
    --ng: #f85149;
    --ng-bg: rgba(248, 81, 73, 0.1);
    --ng-border: rgba(248, 81, 73, 0.35);
    --accent: #58a6ff;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  a.admin-btn {
    display: inline-block;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: color .15s, border-color .15s;
    line-height: 1;
  }

  a.admin-btn:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .02em;
  }

  .pulse {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 0;
  }

  .summary-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }

  .summary-chip .num {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }

  .summary-chip .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .summary-chip.ok .num { color: var(--ok); }
  .summary-chip.ng .num { color: var(--ng); }

  .updated {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-bottom: 14px;
  }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border-radius: 12px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    transition: border-color .2s;
  }

  .card.ok {
    border-color: var(--ok-border);
    background: var(--ok-bg);
  }

  .card.ng {
    border-color: var(--ng-border);
    background: var(--ng-bg);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .hospital-name {
    font-size: 16px;
    font-weight: 600;
  }

  .badge {
    flex-shrink: 0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
  }

  .badge.ok {
    background: var(--ok-bg);
    color: var(--ok);
    border: 1px solid var(--ok-border);
  }

  .badge.ng {
    background: var(--ng-bg);
    color: var(--ng);
    border: 1px solid var(--ng-border);
  }

  .card-note {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-time {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.7;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .history-section {
    margin-top: 28px;
  }

  .history-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .history-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .history-item:last-child { border-bottom: none; }

  .history-time {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--muted);
    min-width: 40px;
  }

  .history-name {
    flex-shrink: 0;
    font-weight: 500;
    min-width: 120px;
  }

  .history-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .history-badge.ok {
    background: var(--ok-bg);
    color: var(--ok);
    border: 1px solid var(--ok-border);
  }

  .history-badge.ng {
    background: var(--ng-bg);
    color: var(--ng);
    border: 1px solid var(--ng-border);
  }

  .history-note {
    color: var(--muted);
    font-size: 12px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

  .error-bar {
    background: var(--ng-bg);
    border: 1px solid var(--ng-border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--ng);
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>🏥 病院受け入れ状況</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="pulse">
      <div class="pulse-dot"></div>
      リアルタイム更新中
    </div>
    <a href="admin.html" class="admin-btn">管理</a>
  </div>
</header>

<div class="container">
  <div class="error-bar" id="error-bar">接続エラー: データを取得できませんでした</div>

  <div class="summary-bar">
    <div class="summary-chip ok">
      <div class="num" id="ok-count">—</div>
      <div class="label">受け入れ可</div>
    </div>
    <div class="summary-chip ng">
      <div class="num" id="ng-count">—</div>
      <div class="label">受け入れ不可</div>
    </div>
  </div>

  <div class="updated" id="last-updated">読み込み中...</div>

  <div class="card-list" id="card-list">
    <div class="empty">読み込み中...</div>
  </div>

  <div class="history-section">
    <div class="history-title">過去24時間の更新履歴</div>
    <div id="history-list"><div class="empty">読み込み中...</div></div>
  </div>
</div>

<script>
// =============================================
// ★ここを自分のSupabase情報に書き換えてください★
const SUPABASE_URL = 'https://lidypwvgdhuuizgviyga.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZHlwd3ZnZGh1dWl6Z3ZpeWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTMwMTcsImV4cCI6MjA4OTYyOTAxN30.hp-vX_RZ4sloSdxXiPBfsEXDzMrteHxToq4noNOd-ow';
// =============================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let hospitals = [];
let statusMap = {};
let historyList = [];

async function loadData() {
  try {
    const { data: hList, error: hErr } = await db
      .from('hospitals')
      .select('id, name')
      .order('created_at');
    if (hErr) throw hErr;
    hospitals = hList;

    const { data: sList, error: sErr } = await db
      .from('hospital_status')
      .select('hospital_id, available, note, updated_at');
    if (sErr) throw sErr;

    statusMap = {};
    sList.forEach(s => { statusMap[s.hospital_id] = s; });

    await loadHistory();

    render();
    document.getElementById('error-bar').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('error-bar').style.display = 'block';
  }
}

async function loadHistory() {
  const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
  const { data, error } = await db
    .from('hospital_status_history')
    .select('hospital_id, available, note, changed_at')
    .gte('changed_at', since)
    .order('changed_at', { ascending: false })
    .limit(50);
  if (!error) historyList = data || [];
}

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const list = document.getElementById('card-list');
  const okCount = hospitals.filter(h => statusMap[h.id]?.available !== false).length;
  const ngCount = hospitals.length - okCount;

  document.getElementById('ok-count').textContent = okCount;
  document.getElementById('ng-count').textContent = ngCount;
  document.getElementById('last-updated').textContent =
    '最終確認: ' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  if (hospitals.length === 0) {
    list.innerHTML = '<div class="empty">病院情報がありません</div>';
  } else {
    const sorted = [...hospitals].sort((a, b) => {
      const aOk = statusMap[a.id]?.available !== false;
      const bOk = statusMap[b.id]?.available !== false;
      return (aOk ? 1 : 0) - (bOk ? 1 : 0);
    });

    list.innerHTML = sorted.map(h => {
      const s = statusMap[h.id];
      const ok = s?.available !== false;
      const note = s?.note || '';
      const time = formatTime(s?.updated_at);
      return `
        <div class="card ${ok ? 'ok' : 'ng'}">
          <div class="card-header">
            <span class="hospital-name">${h.name}</span>
            <span class="badge ${ok ? 'ok' : 'ng'}">${ok ? '受け入れ可' : '受け入れ不可'}</span>
          </div>
          ${note ? `<div class="card-note">${note}</div>` : ''}
          <div class="card-time">更新: ${time}</div>
        </div>`;
    }).join('');
  }

  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (historyList.length === 0) {
    el.innerHTML = '<div class="empty">更新履歴はありません</div>';
    return;
  }
  const hospitalMap = {};
  hospitals.forEach(h => { hospitalMap[h.id] = h.name; });

  el.innerHTML = historyList.map(h => {
    const name = hospitalMap[h.hospital_id] || '—';
    const ok = h.available !== false;
    const time = formatTime(h.changed_at);
    const note = h.note || '';
    return `
      <div class="history-item">
        <span class="history-time">${time}</span>
        <span class="history-name">${name}</span>
        <span class="history-badge ${ok ? 'ok' : 'ng'}">${ok ? '受入可' : '受入不可'}</span>
        ${note ? `<span class="history-note">${note}</span>` : ''}
      </div>`;
  }).join('');
}

// リアルタイム購読
function subscribe() {
  db.channel('status-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'hospital_status' }, () => loadData())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'hospitals' }, () => loadData())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'hospital_status_history' }, payload => {
      historyList.unshift(payload.new);
      if (historyList.length > 50) historyList.pop();
      renderHistory();
    })
    .subscribe();
}

loadData();
subscribe();
</script>
</body>
</html>
